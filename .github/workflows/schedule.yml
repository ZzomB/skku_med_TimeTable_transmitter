name: Auto Update Timetable

on:
  schedule:
    - cron: '0 21 * * *' # KST 오전 6시 (UTC 기준 21시)
  workflow_dispatch: # 수동 실행 버튼 활성화

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: 소스코드 가져오기
        uses: actions/checkout@v4

      - name: Node.js 세팅
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: 패키지 설치
        run: npm install

      - name: Puppeteer용 크롬 브라우저 설치
        run: npx puppeteer browsers install chrome

      - name: 크롤링 스크립트 실행
        env:
          USER_ID: ${{ secrets.USER_ID }}
          USER_PASS: ${{ secrets.USER_PASS }}
        run: node index.js

      - name: 변경사항 커밋 및 푸시
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add schedule.json screenshot.png page.html
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update schedule" && git push)